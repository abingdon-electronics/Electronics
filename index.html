<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abingdon School - Circuit Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1100px; margin: 0 auto; padding: 10px 20px; line-height: 1.6; color: #000; background-color: #fafafa; }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { color: #000; margin-bottom: 0px; text-transform: uppercase; letter-spacing: 1px; font-size: 28px; }
        .header p { margin-top: 5px; font-size: 18px; color: #555; }
        .header span { color: #E64097; font-weight: bold; }
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab { padding: 10px 25px; font-size: 16px; font-weight: bold; cursor: pointer; background-color: #eaeaea; border: 2px solid #ccc; border-radius: 8px; color: #555; transition: all 0.2s; }
        .tab.active { background-color: #E64097; color: white; border-color: #E64097; box-shadow: 0 4px 6px rgba(230, 64, 151, 0.2); }
        .main-layout { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
        .left-panel { flex: 1 1 550px; max-width: 650px; }
        .circuit-container { border: 2px solid #eaeaea; padding: 15px; text-align: center; background-color: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        canvas { background-color: white; border-radius: 4px; max-width: 100%; height: auto; }
        .right-panel { flex: 1 1 350px; display: flex; flex-direction: column; gap: 15px; }
        .quiz-section { background-color: #fdf4f8; padding: 15px 20px; border-radius: 8px; border: 1px solid #f2c7db; }
        .scoreboard { background-color: #fff; padding: 6px 15px; border: 2px solid #E64097; border-radius: 6px; font-weight: bold; font-size: 16px; color: #E64097; }
        .btn-check { background-color: #E64097; width: 100%; margin-top: 10px; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .solutions { padding: 15px; background-color: #f8f9fa; border-left: 4px solid #E64097; display: none; text-align: left; }
    </style>
</head>
<body>
    <div class="header"><h1><span>Abingdon</span> Electronics</h1><p>Basics</p></div>
    <div class="tabs">
        <button class="tab active" onclick="switchTab('analysis')">Circuit Analysis</button>
        <button class="tab" onclick="switchTab('astable')">Astable 555</button>
    </div>
    <div class="main-layout">
        <div class="left-panel"><div class="circuit-container"><canvas id="circuitCanvas" width="600" height="420"></canvas></div></div>
        <div class="right-panel">
            <div class="quiz-section">
                <div id="scoreDisplay" class="scoreboard">Score: 0 / 0</div>
                <div id="inputGroupAstable" style="display:none; text-align: center;">
                    <p>Frequency (Hz) and Period (ms)</p>
                    <input type="text" id="inputAstable" placeholder="Frequency">
                    <input type="text" id="inputAstableT" placeholder="Period">
                </div>
                <button class="btn-check" onclick="checkAnswers()">Check Answer(s)</button>
                <div id="feedback" class="feedback"></div>
            </div>
            <div id="solutions" class="solutions"><h3>Logic</h3><p id="solText"></p></div>
        </div>
    </div>

    <script>
        const brandPink = "#E64097";
        const brandBlack = "#000000";
        let currentMode = 'analysis';
        let problemsAttempted = 0, problemsCorrect = 0;

        function drawResistor(ctx, x, y) {
            ctx.beginPath(); ctx.rect(x - 12, y - 25, 24, 50); ctx.fillStyle = "white"; ctx.fill(); ctx.stroke();
        }

        function drawLine(ctx, x1, y1, x2, y2) {
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        }

        function drawDot(ctx, x, y) {
            ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fillStyle = brandBlack; ctx.fill();
        }

        function generateAstableProblem() {
            const canvas = document.getElementById('circuitCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const RA = [1, 2.2, 4.7, 10, 22, 47][Math.floor(Math.random() * 6)];
            const RB = [1, 2.2, 4.7, 10, 22, 47][Math.floor(Math.random() * 6)];
            const C = [1, 10, 47, 100][Math.floor(Math.random() * 4)];
            const frequency = 1.44 / (((RA * 1000) + (2 * RB * 1000)) * (C * 0.000001));

            ctx.strokeStyle = brandBlack; ctx.lineWidth = 2;
            drawLine(ctx, 100, 60, 500, 60); drawLine(ctx, 100, 360, 500, 360);
            ctx.strokeRect(120, 150, 120, 130);
            ctx.font = "bold 22px Arial"; ctx.textAlign = "center"; ctx.fillText("555", 180, 220);

            drawResistor(ctx, 300, 115); 
            drawResistor(ctx, 300, 215);
            drawLine(ctx, 300, 60, 300, 90);
            drawLine(ctx, 300, 140, 300, 190);
            
            // Re-positioned Capacitor with original shape
            drawLine(ctx, 300, 240, 300, 320);
            ctx.beginPath(); ctx.moveTo(275, 320); ctx.lineTo(325, 320);
            ctx.moveTo(275, 328); ctx.lineTo(325, 328); ctx.stroke();
            drawLine(ctx, 300, 328, 300, 360);

            ctx.textAlign = "left"; ctx.font = "16px Arial";
            ctx.fillText(RA + " kΩ", 335, 120);
            ctx.fillText(RB + " kΩ", 335, 220);
            ctx.fillText(C + " μF", 335, 330);

            document.getElementById('solText').innerHTML = `f = 1.44 / ((${RA}k + 2*${RB}k) * ${C}μ) = ${frequency.toFixed(2)} Hz`;
        }

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('inputGroupAstable').style.display = (mode === 'astable') ? 'block' : 'none';
            if (mode === 'astable') generateAstableProblem();
        }

        window.onload = () => generateAstableProblem();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abingdon School - Circuit Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1100px; margin: 0 auto; padding: 10px 20px; line-height: 1.6; color: #000; background-color: #fafafa; }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { color: #000; margin-bottom: 0px; text-transform: uppercase; letter-spacing: 1px; font-size: 28px; }
        .header p { margin-top: 5px; font-size: 18px; color: #555; }
        .header span { color: #E64097; font-weight: bold; }
        
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab { padding: 10px 25px; font-size: 16px; font-weight: bold; cursor: pointer; background-color: #eaeaea; border: 2px solid #ccc; border-radius: 8px; color: #555; transition: all 0.2s; }
        .tab.active { background-color: #E64097; color: white; border-color: #E64097; box-shadow: 0 4px 6px rgba(230, 64, 151, 0.2); }

        .main-layout { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
        .left-panel { flex: 1 1 550px; max-width: 650px; }
        .circuit-container { border: 2px solid #eaeaea; padding: 15px; text-align: center; background-color: #fff; border-radius: 8px; }
        canvas { background-color: white; border-radius: 4px; max-width: 100%; height: auto; border: 1px solid #ddd; }
        
        .right-panel { flex: 1 1 350px; display: flex; flex-direction: column; gap: 15px; }
        .quiz-section { background-color: #fdf4f8; padding: 15px 20px; border-radius: 8px; border: 1px solid #f2c7db; }
        
        .scoreboard { background-color: #fff; padding: 6px 15px; border: 2px solid #E64097; border-radius: 6px; font-weight: bold; color: #E64097; margin-bottom: 10px; text-align: center; }
        
        .input-group { margin: 10px 0; font-size: 16px; font-weight: bold; }
        input[type="text"] { font-size: 16px; padding: 6px; width: 120px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        .feedback { font-size: 16px; margin-top: 10px; min-height: 24px; text-align: center; font-weight: bold; }
        
        .btn-check { background-color: #E64097; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-black { background-color: #000; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; margin-top: 5px; }
        .btn-secondary { background-color: #6c757d; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; margin-top: 5px; }

        .solutions { padding: 15px; background-color: #f8f9fa; border-left: 4px solid #E64097; display: none; margin-top: 10px; }
        #formula-image { max-width: 100%; margin: 10px 0; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="header">
        <h1><span>Abingdon</span> Electronics</h1>
        <p>Astable 555 Challenge</p>
    </div>

    <div class="tabs">
        <button class="tab" onclick="location.reload()">Reset</button>
        <button class="tab active">Astable 555</button>
    </div>

    <div class="main-layout">
        <div class="left-panel">
            <div class="circuit-container">
                <canvas id="circuitCanvas" width="600" height="400"></canvas>
            </div>
        </div>

        <div class="right-panel">
            <div class="scoreboard" id="scoreDisplay">Score: 0 / 0</div>
            
            <div class="quiz-section">
                <div id="formula-box" style="text-align: center; font-size: 14px; margin-bottom: 10px;">
                    <strong>Mark : Space = (R<sub>A</sub> + R<sub>B</sub>) : R<sub>B</sub></strong>
                </div>

                <div id="q1-area" class="input-group">
                    <label id="label1" for="ans1">Value 1: </label><br>
                    <input type="text" id="ans1" placeholder="e.g. 1.2kHz or 2/1">
                </div>
                
                <div id="q2-area" class="input-group">
                    <label id="label2" for="ans2">Value 2: </label><br>
                    <input type="text" id="ans2">
                </div>
                
                <button class="btn-check" onclick="checkAnswers()">Check Answer</button>
                <div id="feedback" class="feedback"></div>
            </div>

            <button class="btn-black" onclick="generateProblem()">New Problem</button>
            <button id="helpBtn" class="btn-secondary" onclick="toggleSolutions()" style="display:none;">Need Help?</button>

            <div id="solutions" class="solutions">
                <p id="solText"></p>
            </div>
        </div>
    </div>

    <script>
        let currentAnswers = {};
        let score = 0; let total = 0;
        let currentStyle = "";

        function parseInput(str) {
            if (!str) return null;
            let s = str.toLowerCase().replace(/\s+/g, '');
            
            // Check for fraction
            if (s.includes('/')) {
                let parts = s.split('/');
                return { val: parseFloat(parts[0]) / parseFloat(parts[1]), type: 'ratio' };
            }

            // Check for units
            let val = parseFloat(s);
            let unit = s.replace(/[0-9\.]/g, '');
            if (unit === 'khz') val *= 1000;
            if (unit === 'ms') val /= 1000;
            return { val: val, type: 'num' };
        }

        function generateProblem() {
            const canvas = document.getElementById('circuitCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('feedback').innerText = "";
            document.getElementById('solutions').style.display = "none";
            document.getElementById('helpBtn').style.display = "none";
            document.getElementById('ans1').value = "";
            document.getElementById('ans2').value = "";
            
            // Circuit drawing (Simplified 555)
            ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
            ctx.strokeRect(300, 150, 100, 120);
            ctx.fillText("555", 340, 215);

            const R_vals = [1, 2.2, 4.7, 10, 15, 22];
            let RA = R_vals[Math.floor(Math.random()*R_vals.length)];
            let RB = R_vals[Math.floor(Math.random()*R_vals.length)];
            let C = 10; // 10uF constant for complexity management

            let rand = Math.random();
            if (rand < 0.33) {
                currentStyle = "standard";
                let f = 1.44 / ((RA*1000 + 2*RB*1000) * (C * 1e-6));
                currentAnswers = { a1: f, a2: 1/f };
                document.getElementById('label1').innerText = "Frequency (Hz):";
                document.getElementById('label2').innerText = "Time Period (s):";
                document.getElementById('q2-area').style.display = "block";
                ctx.fillText("RA = " + RA + "kΩ", 150, 100);
                ctx.fillText("RB = " + RB + "kΩ", 150, 130);
                ctx.fillText("C = " + C + "μF", 150, 160);
                document.getElementById('solText').innerText = "f = 1.44 / ((RA + 2RB) * C). T = 1/f.";
            } else if (rand < 0.66) {
                currentStyle = "findRB";
                let ratioVal = (RA + RB) / RB;
                currentAnswers = { a1: RB };
                document.getElementById('label1').innerText = "Find RB (kΩ):";
                document.getElementById('q2-area').style.display = "none";
                ctx.fillText("RA = " + RA + "kΩ", 150, 100);
                ctx.fillText("Mark-Space Ratio = " + (RA+RB).toFixed(1) + " / " + RB.toFixed(1), 150, 130);
                document.getElementById('solText').innerText = "Ratio = (RA+RB)/RB. Solve for RB.";
            } else {
                currentStyle = "findRatio";
                currentAnswers = { a1: (RA + RB) / RB };
                document.getElementById('label1').innerText = "Mark:Space Ratio (fraction):";
                document.getElementById('q2-area').style.display = "none";
                ctx.fillText("RA = " + RA + "kΩ", 150, 100);
                ctx.fillText("RB = " + RB + "kΩ", 150, 130);
                document.getElementById('solText').innerText = "Ratio = (RA + RB) / RB. Write as RA+RB over RB.";
            }
        }

        function checkAnswers() {
            let u1 = parseInput(document.getElementById('ans1').value);
            let u2 = parseInput(document.getElementById('ans2').value);
            let correct = false;

            if (currentStyle === "standard") {
                if (u1 && u2 && Math.abs(u1.val - currentAnswers.a1) < currentAnswers.a1*0.05 && Math.abs(u2.val - currentAnswers.a2) < currentAnswers.a2*0.05) {
                    correct = true;
                }
            } else {
                if (u1 && Math.abs(u1.val - currentAnswers.a1) < 0.02) {
                    correct = true;
                }
            }

            total++;
            if (correct) {
                score++;
                document.getElementById('feedback').innerHTML = "<span style='color:green'>Correct!</span>";
            } else {
                document.getElementById('feedback').innerHTML = "<span style='color:red'>Incorrect.</span>";
                document.getElementById('helpBtn').style.display = "block";
            }
            document.getElementById('scoreDisplay').innerText = "Score: " + score + " / " + total;
        }

        function toggleSolutions() {
            document.getElementById('solutions').style.display = "block";
        }

        window.onload = generateProblem;
    </script>
</body>
</html>
